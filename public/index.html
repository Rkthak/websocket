<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Chat App</h1>

    <div>
      <label>Username:</label>
      <input id="username" placeholder="Enter username" />
    </div>

    <br />

    <div>
      <label>Room:</label>
      <input id="room" placeholder="Enter room name" />
    </div>

    <br />

    <div>
      <label>Send to user:</label>
      <input id="to" placeholder="Enter receiver username" />
    </div>

    <br />

    <div>
      <label>Message:</label>
      <input id="message" placeholder="Enter message" />
    </div>

    <br />

    <button id="join">Join Room</button>

    <button id="send">Send Group</button>

    <button id="privateSend">Send Private</button>

    <div id="chat"></div>

    <script>
      const socket = new WebSocket("ws://localhost:3000");

      const join = document.getElementById("join");
      const send = document.getElementById("send");
      const username = document.getElementById("username");
      const room = document.getElementById("room");
      const chat = document.getElementById("chat");
      const message = document.getElementById("message");
      const privateSend = document.getElementById("privateSend");
      const to = document.getElementById("to");

      privateSend.addEventListener("click", () => {
        const data = {
          type: "private",
          to: to.value,
          text: message.value,
        };
        socket.send(JSON.stringify(data));
      });

      const sendMessage = () => {
        const data = {
          type: "message",
          text: message.value,
        };

        if (message.value.trim() === "") {
          return;
        }

        socket.send(JSON.stringify(data));

        message.value = "";
      };

      join.addEventListener("click", () => {
        const data = {
          type: "join",
          user: username.value,
          room: room.value,
        };
        socket.send(JSON.stringify(data));
        join.disabled = true;
        username.disabled = true;
      });

      send.addEventListener("click", () => {
        sendMessage();
      });

      message.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          sendMessage();
        }
      });

      socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "join") {
          const p = document.createElement("p");

          p.textContent = `${data.user} joined the chat`;

          chat.appendChild(p);
        } else if (data.type === "message") {
          const p = document.createElement("p");

          p.textContent = `${data.user} : ${data.text}`;

          chat.appendChild(p);
          if (data.user === username.value) {
            p.classList.add("my-message");
          } else {
            p.classList.add("other-message");
          }
        } else if (data.type === "leave") {
          const p = document.createElement("p");

          p.textContent = `${data.user} left the chat`;

          chat.appendChild(p);
        } else if (data.type === "private") {
          const p = document.createElement("p");

          p.textContent = `${data.from} : ${data.text}`;

          chat.appendChild(p);
        }
      };
    </script>
  </body>
</html>
